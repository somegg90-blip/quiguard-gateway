# =============================================================
# QuiGuard Backend — Render Configuration
# Place in repo root alongside Dockerfile
# =============================================================

services:
  - type: web
    name: quiguard-backend
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerContext: .
    dockerfilePath: ./Dockerfile

    # Health check (keeps service alive, prevents cold starts)
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PYTHONUNBUFFERED
        value: "1"
