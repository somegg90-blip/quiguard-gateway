<!DOCTYPE html>
<html>
<head>
    <title>IronLayer Test Console</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { background: #f4f4f4; padding: 15px; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>IronLayer Security Test</h2>
    <p>Type a prompt below. This simulates a user sending data to an AI.</p>
    
    <textarea id="prompt" placeholder="e.g., My email is test@gmail.com and my project is ProjectStarlight."></textarea>
    <br>
    <button onclick="sendRequest()">Send to IronLayer (Sanitize)</button>

    <div class="result" id="output" style="display:none;">
        <h3>AI Response (Secrets Restored):</h3>
        <p id="responseText"></p>
    </div>

    <script>
        async function sendRequest() {
            const prompt = document.getElementById('prompt').value;
            const outputDiv = document.getElementById('output');
            const responseText = document.getElementById('responseText');
            
            outputDiv.style.display = 'block';
            responseText.innerText = "Processing...";

            // This sends the request to YOUR local running IronLayer proxy
            // Note: Your FastAPI server must be running (uvicorn app.main:app)
            const response = await fetch('http://127.0.0.1:8000/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gpt-4", // IronLayer will swap this to the free model
                    messages: [{ role: "user", content: prompt }]
                })
            });

            const data = await response.json();
            
            if (data.choices && data.choices[0]) {
                responseText.innerText = data.choices[0].message.content;
            } else {
                responseText.innerText = "Error: " + JSON.stringify(data);
            }
        }
    </script>
</body>
</html>
